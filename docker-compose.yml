services:
  postgres:
    image: postgres:16
    container_name: sql-viz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: visualizer
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: planviz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
